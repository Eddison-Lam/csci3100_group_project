services:
  db:
    image: mysql:8.0 
    restart: always
    ports:
      - "127.0.0.1:${EXTERNAL_DB_PORT:-3306}:3306" 
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    # (if want to have GUI tools)
    # ports:
    #   - "6379:6379"

  web:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      DATABASE_HOST: db
      DATABASE_PASSWORD: root   # ← from .env
      DB_NAME: app_db                 # ← from .env
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - db
      - redis
    ports:
      - "${EXTERNAL_WEB_PORT:-3000}:3000"
    command: sh -c "rm -f /app/tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 3000"
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  redis_data:
  