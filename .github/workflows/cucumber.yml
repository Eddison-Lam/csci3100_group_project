name: Cucumber Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Matches your docker-compose 'db' service
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root    # From your .env: DB_PASSWORD
          MYSQL_DATABASE: app_db       # From your .env: DB_NAME
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      # Matches your docker-compose 'redis' service
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      RAILS_ENV: test
      # We use 127.0.0.1 because GitHub maps service ports to the local runner
      DATABASE_URL: "mysql2://root:root@127.0.0.1:3306/app_db"
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL Client headers
        # Necessary for the 'mysql2' gem to compile on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y libmysqlclient-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Match your local Ruby version
          bundler-cache: true # Caches gems automatically

      - name: Install JS dependencies
        run: npm install

      - name: Build assets
        # Required since you use jsbundling-rails
        run: bundle exec rails javascript:build

      - name: Set up Database
        run: |
          bin/rails db:prepare

      - name: Run Cucumber tests
        run: bundle exec cucumber

      - name: Upload Screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capybara-screenshots
          path: tmp/capybara/